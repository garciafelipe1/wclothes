name: Build Medusa Backend Docker Image

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "Dockerfile"
      - ".github/workflows/build-backend-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  Build-Backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (Medusa Backend)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner_backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ecommerce-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
